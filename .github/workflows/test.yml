name: Test
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: astral-sh/setup-uv@v8.2.0
              with:
                  python-version: "3.12"
            - run: uv sync
            - run: uv run pytest -v --tb=short
