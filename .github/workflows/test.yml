name: Test
on:
    push:
        branches: [main]
        paths:
            - src/**/*.py
            - tests/**/*.py
            - examples/**/*.py
            - pyproject.toml
    pull_request:
        branches: [main]
        paths:
            - src/**/*.py
            - tests/**/*.py
            - examples/**/*.py
            - pyproject.toml

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: astral-sh/setup-uv@v8.2.0
              with:
                  python-version: "3.12"
            - run: uv sync
            - run: uv run pytest -v --tb=short
